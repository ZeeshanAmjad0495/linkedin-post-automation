name: linkedin-autopost

# FREE always-on scheduler (runs even when your Mac is off).
# GitHub Actions gives 2,000 free minutes/month on private repos; a daily run
# uses ~1-2 minutes, so this stays comfortably free.
on:
  schedule:
    # 13:30 UTC daily. Adjust to your timezone (this is ~09:30 US-Eastern).
    - cron: "30 13 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write          # so the job can commit updated rotation state

concurrency:
  group: linkedin-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish one post
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IMAGE_MODE: ${{ vars.IMAGE_MODE || 'mix' }}
          POST_VISIBILITY: ${{ vars.POST_VISIBILITY || 'PUBLIC' }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
          # Live posting is OFF until you deliberately set repository variable
          # LIVE_POSTING=true. Until then every run (including manual "Run
          # workflow") is a dry run that writes out/last_post.txt for review.
          DRY_RUN: ${{ vars.LIVE_POSTING == 'true' && 'false' || 'true' }}
        run: python -m src.bot

      - name: Persist rotation state
        run: |
          if [[ -n "$(git status --porcelain state/state.json)" ]]; then
            git config user.name "linkedin-autopost-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state/state.json
            git commit -m "chore: update rotation state [skip ci]"
            git push
          fi
